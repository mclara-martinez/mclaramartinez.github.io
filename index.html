<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doce Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple: #6A1B9A;
      --navy-dark: #0F172A;
      --white: #FFFFFF;
      --gray-mid: #9CA3AF;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--navy-dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
    }

    .logo {
      width: 280px;
      max-width: 80vw;
      margin-bottom: 48px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 8vw, 80px);
      letter-spacing: 3px;
      color: var(--white);
      line-height: 1;
      margin-bottom: 16px;
    }

    .accent {
      color: var(--purple);
    }

    .tagline {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--gray-mid);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/doceprojects-logo-blanco.png" alt="Doce Projects" class="logo">
    <h1>Welcome to <span class="accent">Doce Projects</span></h1>
    <p class="tagline">Make it real.</p>
  </div>
</body>
</html>
